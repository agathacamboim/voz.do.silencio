<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatos</title>
</head>
<body style="margin:0; font-family: Arial; background: linear-gradient(to bottom, #fff7fb, #f3e8ff);"></body>

<!-- HEADER -->
<div style="background:#8B1E3F; color:white; padding:20px; display:flex; align-items:center; justify-content:space-between;">

    <a href="/homepage"
       style="background:white; color:#8B1E3F; padding:8px 12px; border-radius:10px; text-decoration:none;">
       ← Voltar
    </a>

    <h2 style="margin:0; flex:1; text-align:left; margin-left:20px;">
        Relatos | Aqui, sua voz importa
    </h2>

</div>

<!-- TÍTULO -->
<h1 style="text-align:center; color:#8B1E3F; margin-top:30px;">Deixe seu relato</h1>

<!-- TOPO -->
<div style="display:flex; justify-content:center; gap:40px; margin:40px; flex-wrap:wrap;">

    <!-- FORM -->
    <div style="background:white; padding:25px; border-radius:15px; width:350px; box-shadow:0 8px 20px rgba(0,0,0,0.1);">

        <form method="POST">

            <label><b>Conte seu relato:</b></label><br>
            <textarea name="relato" required
                style="width:100%; height:120px; margin:10px 0; padding:10px; border-radius:10px; border:1px solid #ccc;">
            </textarea>

            <label><b>Nome (opcional):</b></label><br>
            <input type="text" name="nome"
                style="width:100%; margin:10px 0; padding:8px; border-radius:10px; border:1px solid #ccc;">

            <label><b>Publicar como anônimo?</b></label><br>

            <input type="radio" name="anonimo" value="sim"> Sim
            <input type="radio" name="anonimo" value="nao" checked> Não

            <br><br>

            <button type="submit"
                style="width:100%; padding:12px; border:none; border-radius:10px; background: #8B1E3F; color:white;">
                ENVIAR RELATO
            </button>

        </form>
    </div>

    <!-- AVISO -->
    <div style="background:#ffe1e1; padding:20px; border-radius:15px; width:250px;">
        <h3>⚠ Aviso importante</h3>
        <p>Se você estiver em perigo, procure ajuda imediata.</p>
        <p>Esse site não substitui ajuda profissional!</p>
    </div>

</div>

<!-- RELATOS -->
<h2 style="text-align:center;">💬 Relatos</h2>

<div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin:20px;">

    {% for r in relatos %}

    <div style="background:white; padding:15px; border-radius:15px; width:250px; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
        <p>"{{ r[0] }}"</p>
        <span style="font-size:12px; color:gray;">— {{ r[1] if r[1] else "Anônimo" }}</span>
    </div>
    {% endfor %}

</div>

</body>
</html>
