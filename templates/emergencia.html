<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números de emergência</title>
 <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fff0f5;
      text-align: center;
      min-height: 100vh;
    }
      .header {
      background: #7b1e2b;
      color: white;
      padding: 20px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 4px solid #5a1420;
    }

     .btn-voltar {
      position: absolute;
      left: 15px;
      background: white;
      color: #7b1e2b;
      border: 2px solid #7b1e2b;
      border-radius: 25px;
      padding: 8px 18px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 10;
    }

      .btn-voltar:hover {
      background: #f3f3f3;
    }

       .titulo {
      font-size: 28px;
      font-weight: bold;
    }

      .subtitulo {
      font-size: 22px;
      margin: 40px 20px;
      color: #444;
      font-weight: bold;
    }

       .grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

      .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 25px;
      width: 200px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      text-decoration: none;
      color: black;
      transition: 0.2s;
      border: 2px solid #f1b0b7;
    }

       .card:hover {
      transform: scale(1.05);
      background: #fff5f6;
    }

      .card:hover {
      transform: scale(1.05);
    }

        .card h3 {
      font-size: 16px;
      color: #555;
    }

       .numero {
      font-size: 20px;
      font-weight: bold;
      margin-top: 8px;
    }

       .grande {
      width: 260px;
    }
 </style>
    </head>

<body>

  <div class="header">
    <button class="btn-voltar" onclick="history.back()">← Voltar</button>
    <div class="titulo">Números de emergência</div>
  </div>

  <div class="subtitulo">
    Em casos de emergência ligue para um desses números
  </div>

  <div class="grid">

    <a href="tel:190" class="card">
      <h3>Polícia Militar</h3>
      <div class="numero">190</div>
    </a>

    <a href="tel:192" class="card">
      <h3>SAMU</h3>
      <div class="numero">192</div>
    </a>

    <a href="tel:193" class="card">
      <h3>Corpo de bombeiros</h3>
      <div class="numero">193</div>
    </a>

      <a href="tel:180" class="card grande">
      <h3>Central de atendimento à mulher</h3>
      <div class="numero">180</div>
    </a>

  </div>

</body>
</html>
